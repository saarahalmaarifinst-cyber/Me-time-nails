<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me Time Nails | Luxury Nail Artistry Cape Town</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --mint: #b2cfc8;
    --charcoal: #121212;
    --gold: #b8934d;
    --soft: #f6faf8;
}

* {margin:0;padding:0;box-sizing:border-box;}
body {font-family: 'Montserrat'; background:white; color:var(--charcoal);}

nav {
    position:fixed;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.logo {
    font-family:'Playfair Display';
    font-size:1.5rem;
}

.nav-links {display:flex;gap:30px;align-items:center;}

.btn {
    background:var(--charcoal);
    color:white;
    padding:12px 25px;
    text-decoration:none;
    cursor:pointer;
    border:none;
}

.btn:hover {background:var(--gold);}

/* HERO */
.hero {
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:var(--soft);
}

.hero h1 {
    font-family:'Playfair Display';
    font-size:clamp(3rem,6vw,5rem);
}

.hero span {color:var(--gold); font-style:italic;}

.hero p {margin:20px 0;}

/* GALLERY */
.gallery {
    padding:80px 8%;
}

.gallery-wrapper {
    display:flex;
    gap:20px;
    overflow-x:auto;
}

.gallery-item {
    min-width:300px;
    height:350px;
    overflow:hidden;
}

.gallery img {
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

.gallery img:hover {transform:scale(1.1);}

/* SERVICES */
.services {
    padding:80px 8%;
    background:#fafafa;
}

.service {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

/* WHATSAPP FLOAT */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px 20px;
    border-radius:50px;
    text-decoration:none;
    font-size:14px;
}

/* FOOTER */
footer {
    padding:50px 8%;
    background:black;
    color:white;
    text-align:center;
}
</style>
</head>

<body>

<nav>
    <div class="logo">ME TIME Nails</div>
    <div class="nav-links">
        <a href="#gallery">Gallery</a>
        <a href="#services">Menu</a>
        <button onclick="bookEmail()" class="btn">Book</button>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>Luxury <span>Nail Artistry</span></h1>
        <p>Cape Town • Churchill Estate</p>
        <button onclick="bookWhatsApp()" class="btn">Book via WhatsApp</button>
    </div>
</section>

<section id="gallery" class="gallery">
    <h2>Recent Work</h2>
    <div class="gallery-wrapper" id="slider">
        <div class="gallery-item"><img src="https://i.ibb.co/Z6YJx6Mq/IMG-5047.jpg"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/hx8KYFzY/IMG-5036.jpg"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/C5z2m5xb/IMG-5039.jpg"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/5Qy0zgD/IMG-5032.jpg"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/YT0JQPgY/IMG-5037.jpg"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/23Xqy64H/IMG-5044.jpg"></div>
    </div>
</section>

<section id="services" class="services">
    <h2>Services</h2>

    <div class="service"><span>Signature Overlay</span><span>R300</span></div>
    <div class="service"><span>Gel Pedicure</span><span>R200</span></div>
    <div class="service"><span>Extensions</span><span>R400</span></div>
    <div class="service"><span>Rebalance</span><span>R350</span></div>
</section>

<footer>
    <p>110 Frankfort St, Churchill Estate, Cape Town</p>
    <p>061 766 7788</p>
</footer>

<a class="whatsapp" href="#" onclick="bookWhatsApp()">WhatsApp</a>

<script>
function bookEmail(){
    window.location.href="mailto:pinkgalloway@gmail.com";
}

function bookWhatsApp(){
    window.open("https://wa.me/27617667788?text=Hi%20I%20want%20to%20book%20a%20nail%20appointment");
}

// SIMPLE SCROLL ANIMATION
gsap.from(".hero h1", {y:50, opacity:0, duration:1});
gsap.from(".gallery-item", {
    scrollTrigger:".gallery",
    x:100,
    opacity:0,
    stagger:0.2
});
</script>

</body>
</html>
